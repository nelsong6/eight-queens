<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base/pedestal -->
  <rect x="25" y="82" width="50" height="8" rx="3" ry="3" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <rect x="30" y="76" width="40" height="8" rx="2" ry="2" fill="#388e3c" stroke="#2e7d32" stroke-width="1"/>
  <!-- Body (tapered) -->
  <path d="M36,76 L33,50 Q50,56 67,50 L64,76 Z" fill="#388e3c" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="40" y="42" width="20" height="10" rx="4" ry="4" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <!-- Crown base -->
  <ellipse cx="50" cy="42" rx="18" ry="5" fill="#388e3c" stroke="#2e7d32" stroke-width="1"/>
  <!-- Crown points -->
  <path d="M32,42 L30,18 L38,30 L44,14 L50,28 L56,14 L62,30 L70,18 L68,42 Z" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Crown ball tips -->
  <circle cx="30" cy="16" r="3.5" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="44" cy="12" r="3" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="56" cy="12" r="3" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="70" cy="16" r="3.5" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <!-- Center jewel -->
  <circle cx="50" cy="26" r="3.5" fill="#66bb6a" stroke="#2e7d32" stroke-width="1"/>
  <!-- Highlight/shine -->
  <path d="M40,20 Q45,24 42,30" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
  <!-- Checkmark -->
  <path d="M42,52 L48,58 L60,44" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
